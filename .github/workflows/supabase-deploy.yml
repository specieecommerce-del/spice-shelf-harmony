name: Deploy Supabase Functions
on:
  push:
    branches:
      - main
jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy create-asaas-boleto --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy asaas-webhook-register --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy asaas-webhook --project-ref "$SUPABASE_PROJECT_REF"
